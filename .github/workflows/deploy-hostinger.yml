name: Deploy to Hostinger

# Builds the site on every push to main. The built site (dist/) is always
# uploaded as a downloadable artifact — grab it from the run's "Artifacts"
# section and upload its CONTENTS to public_html for a manual deploy.
# If the FTP secrets are configured, the same build is also deployed to
# Hostinger automatically; if they are missing, the FTP step is skipped
# with a warning instead of failing the whole run.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      # Ready-to-upload copy of the site for manual deploys: download it from
      # this run's Artifacts, unzip, and upload the contents to public_html
      # (including the hidden .htaccess and api/.user.ini files).
      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mistvil-site
          path: dist/
          include-hidden-files: true
          if-no-files-found: error

      - name: Check whether FTP secrets are configured
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -n "$FTP_SERVER" ] && [ -n "$FTP_USERNAME" ] && [ -n "$FTP_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP secrets (FTP_SERVER / FTP_USERNAME / FTP_PASSWORD) are not set — skipping the automatic FTP deploy. Download the 'mistvil-site' artifact from this run and upload its contents to public_html manually, or add the secrets in Settings → Secrets and variables → Actions to enable auto-deploy."
          fi

      - name: Deploy dist/ to Hostinger via FTP
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Add these three secrets in GitHub:
          # Repo → Settings → Secrets and variables → Actions → New repository secret
          #   FTP_SERVER   e.g. ftp.yourdomain.com  (from hPanel → Files → FTP Accounts)
          #   FTP_USERNAME your Hostinger FTP username
          #   FTP_PASSWORD your Hostinger FTP password
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Local build output that gets uploaded:
          local-dir: ./dist/
          # Hostinger web root. Defaults to /public_html/ (main domain).
          # For a subdomain (e.g. mistvil.elarisagency.com) add an optional
          # FTP_SERVER_DIR secret with that subdomain's folder, e.g.
          # /public_html/mistvil/ or /domains/mistvil.elarisagency.com/public_html/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/public_html/' }}
          # Keep the shared database file on the server between deploys so
          # published novels are never wiped by a redeploy.
          # Also keep the hourly server-side backups between deploys.
          exclude: |
            **/mistvil_db.json
            **/mistvil_users.json
            **/backups/**
