; Raise PHP limits for the shared database endpoint on shared hosting
; (Hostinger reads .user.ini per-directory). Without this, publishing a
; novel with several images can exceed the default 8M post_max_size and
; the payload arrives truncated -> the novel never reaches the server.
post_max_size = 64M
upload_max_filesize = 64M
memory_limit = 256M
max_execution_time = 60
