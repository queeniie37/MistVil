<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>MistVil | Premium Platform for Translated & Original Novels</title>
    <meta name="title" content="MistVil | Premium Platform for Translated & Original Novels" />
    <meta name="description" content="Your premium platform to read, write, and translate exclusive fantasy novels and stories. Explore daily live chapters from translated Korean, Chinese, and Japanese novels, plus original works crafted to a high artistic standard." />
    <meta name="keywords" content="MistVil, translated novels, original novels, translated Korean novels, translated Chinese novels, translated Japanese novels, fantasy novels, action novels, mystery novels, web novels, light novels, novel translation, read novels online, novel platform, publish stories, write novels, manhwa, comics" />
    <meta name="author" content="MistVil" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="rating" content="General" />
    <meta name="distribution" content="Global" />
    <meta name="expires" content="never" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mistvil.com/" />
    <meta property="og:title" content="MistVil | Premium Platform for Translated & Original Novels" />
    <meta property="og:description" content="Your premium platform to read, write, and translate exclusive fantasy novels and stories. Explore daily live chapters from translated and original novels and light novels." />
    <meta property="og:image" content="https://mistvil.com/site_banner.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="MistVil" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://mistvil.com/" />
    <meta property="twitter:title" content="MistVil | Premium Platform for Translated & Original Novels" />
    <meta property="twitter:description" content="Your premium platform to read, write, and translate exclusive fantasy novels and stories. Explore daily live chapters from translated and original novels and light novels." />
    <meta property="twitter:image" content="https://mistvil.com/site_banner.png" />

    <!-- Favicon and Theme Color -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#0A1120" />

    <!-- Structured Data (JSON-LD) for Search Engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MistVil",
        "url": "https://mistvil.com/",
        "description": "Your premium platform to read, write, and translate exclusive fantasy and action novels and stories.",
        "genre": "https://schema.org/Books",
        "inLanguage": "en",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://mistvil.com/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MistVil",
        "url": "https://mistvil.com/",
        "logo": "https://mistvil.com/site_logo_v2.png",
        "sameAs": [
          "https://twitter.com/mistvil",
          "https://discord.gg/mistvil"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
